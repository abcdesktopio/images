name: CI build app list

on:
  schedule:
    - cron: '0 12 * * 0-6'

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq cli
        run: sudo apt-get install -y jq

      - name: Build app list
        run: |
          ./buildAppList.sh

      - name: Upload app list
        uses: actions/upload-artifact@v3
        with:
          name: appLists
          path: ./appLists